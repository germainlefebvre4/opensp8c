services:
  app:
    image: docker.io/germainlefebvre4/opensp8c:latest
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      CONFIG_PATH: "/config.yaml"
    volumes:
      - ./config.yaml:/config.yaml:ro
      - /usr/local/bin/claude:/usr/local/bin/claude:ro
      - /usr/local/bin/openspec:/usr/local/bin/openspec:ro
      - ${HOME}:/home/${USER}
